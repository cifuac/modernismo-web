<script>
(function(){
  // === 1. MRS. DALLOWAY PUZZLE IMAGE ===
  function injectPuzzleImage(){
    var container = document.querySelector('[aria-labelledby="clarissa-puzzle-title"]');
    if(!container) return;
    var svgBlock = container.querySelector('svg.block');
    if(!svgBlock) return;
    var parent = svgBlock.parentElement;
    if(!parent || parent.querySelector('.dalloway-bg')) return;
    var img = document.createElement('img');
    img.src = 'dalloway.jpg';
    img.alt = 'Retrato de la señora Dalloway';
    img.className = 'dalloway-bg';
    img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.12;border-radius:1rem;pointer-events:none;z-index:0;transition:opacity 0.5s ease;';
    parent.style.position = 'relative';
    parent.insertBefore(img, parent.firstChild);
    svgBlock.style.position = 'relative';
    svgBlock.style.zIndex = '1';
    // Increase opacity when pieces are revealed
    var mo = new MutationObserver(function(){
      var revealed = container.querySelectorAll('path[filter]');
      var count = 0;
      revealed.forEach(function(p){if(p.getAttribute('filter')&&p.getAttribute('filter')!=='none') count++;});
      img.style.opacity = count > 0 ? Math.min(0.08 + count*0.04, 0.35) : 0.12;
    });
    mo.observe(container, {subtree:true, attributes:true, attributeFilter:['filter','style']});
  }

  // === 2. LIGHT MODE INLINE STYLE FIXER ===
  var whiteColorMap = [
    [/rgba?\(255\s*,\s*255\s*,\s*255\s*,\s*0?\.0[0-4]\d*\)/gi, 'rgba(26,26,46,0.08)'],
    [/rgba?\(255\s*,\s*255\s*,\s*255\s*,\s*0?\.0[5-9]\d*\)/gi, 'rgba(26,26,46,0.12)'],
    [/rgba?\(255\s*,\s*255\s*,\s*255\s*,\s*0?\.[12]\d*\)/gi, 'rgba(26,26,46,0.35)'],
    [/rgba?\(255\s*,\s*255\s*,\s*255\s*,\s*0?\.3\d*\)/gi, 'rgba(26,26,46,0.50)'],
    [/rgba?\(255\s*,\s*255\s*,\s*255\s*,\s*0?\.4\d*\)/gi, 'rgba(26,26,46,0.60)'],
    [/rgba?\(255\s*,\s*255\s*,\s*255\s*,\s*0?\.5\d*\)/gi, 'rgba(26,26,46,0.72)'],
    [/rgba?\(255\s*,\s*255\s*,\s*255\s*,\s*0?\.6\d*\)/gi, 'rgba(26,26,46,0.78)'],
    [/rgba?\(255\s*,\s*255\s*,\s*255\s*,\s*0?\.7\d*\)/gi, 'rgba(26,26,46,0.82)'],
    [/rgba?\(255\s*,\s*255\s*,\s*255\s*,\s*0?\.8\d*\)/gi, 'rgba(26,26,46,0.88)'],
    [/rgba?\(255\s*,\s*255\s*,\s*255\s*,\s*0?\.9\d*\)/gi, 'rgba(26,26,46,0.92)'],
    [/rgba?\(255\s*,\s*255\s*,\s*255\s*,\s*1?\s*\)/gi, 'rgba(26,26,46,0.95)'],
  ];
  var darkBgMap = [
    [/#0a0a12/gi, '#f5f0e8'],

  ];
  var lightContrastColorMap = [
    [/#c4b5fd([0-9a-f]{2})?/gi, '#6d28d9$1'],
    [/#60a5fa([0-9a-f]{2})?/gi, '#1d4ed8$1'],
    [/#f472b6([0-9a-f]{2})?/gi, '#be185d$1'],
    [/#fbbf24([0-9a-f]{2})?/gi, '#b45309$1'],
    [/#34d399([0-9a-f]{2})?/gi, '#047857$1'],
    [/#ef4444([0-9a-f]{2})?/gi, '#b91c1c$1'],
    [/#f97316([0-9a-f]{2})?/gi, '#c2410c$1'],
    [/rgba?\(196\s*,\s*181\s*,\s*253\s*,\s*([^)]+)\)/gi, 'rgba(109,40,217,$1)'],
    [/rgba?\(96\s*,\s*165\s*,\s*250\s*,\s*([^)]+)\)/gi, 'rgba(29,78,216,$1)'],
    [/rgba?\(244\s*,\s*114\s*,\s*182\s*,\s*([^)]+)\)/gi, 'rgba(190,24,93,$1)'],
    [/rgba?\(251\s*,\s*191\s*,\s*36\s*,\s*([^)]+)\)/gi, 'rgba(180,83,9,$1)'],
    [/rgba?\(52\s*,\s*211\s*,\s*153\s*,\s*([^)]+)\)/gi, 'rgba(4,120,87,$1)'],

      prop === 'border-top' ||
      prop === 'border-right' ||
      prop === 'border-bottom' ||
      prop === 'border-left' ||

    // Fix white-based text/border colors
    whiteColorMap.forEach(function(pair){
      nextValue = nextValue.replace(pair[0], pair[1]);
    });
    // Fix dark backgrounds
    darkBgMap.forEach(function(pair){
      nextValue = nextValue.replace(pair[0], pair[1]);
    });
    // Fix amber colors for dark text on light bg
    nextValue = nextValue.replace(/rgba?\(251\s*,\s*191\s*,\s*36\s*,\s*0?\.0[0-5]\d*\)/gi, 'rgba(146,64,14,0.08)');

    nextValue = nextValue.replace(/rgba?\(139\s*,\s*92\s*,\s*246\s*,\s*0?\.0\d+\)/gi, 'rgba(88,28,135,0.06)');
    nextValue = nextValue.replace(/rgba?\(96\s*,\s*165\s*,\s*250\s*,\s*0?\.0\d+\)/gi, 'rgba(29,78,216,0.05)');

      document.body.style.backgroundColor = '#f5f0e8';
      document.body.style.color = '#1a1a2e';

      document.documentElement.style.colorScheme = 'dark';

  if(root){

  }

  // Initial runs
  setTimeout(function(){
    injectPuzzleImage();
    fixInlineStyles();
  }, 500);

  setInterval(function(){
    injectPuzzleImage();
    if(document.documentElement.getAttribute('data-theme') === 'light') fixInlineStyles();
  }, 2000);
})();
